name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run runtime:smoke

  native:
    needs: source
    name: native-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - if: matrix.target != 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - if: matrix.target == 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - run: bun scripts/release-validate.ts archives dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  release-assets:
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  homebrew:
    needs: release-assets
    name: homebrew-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-assets
          path: .release-artifacts
      - shell: bash
        run: |
          bun scripts/serve-release-assets.ts .release-artifacts 8765 > .release-artifacts/server.log 2>&1 &
          for attempt in {1..20}; do curl --fail --silent http://127.0.0.1:8765/SHA256SUMS >/dev/null && break; sleep 1; done
          curl --fail --silent http://127.0.0.1:8765/SHA256SUMS >/dev/null
      - shell: bash
        run: |
          git config --global user.name "llm-now CI"
          git config --global user.email "ci@llm-now.invalid"
          brew tap-new swartzrock/llm-now-local
          tap_dir="$(brew --repository swartzrock/llm-now-local)"
          version="$(bun -e 'console.log(require("./package.json").version)')"
          bun scripts/package-render.ts homebrew .release-artifacts/SHA256SUMS "$tap_dir/Formula/llm-now.rb" http://127.0.0.1:8765 0.0.0
          brew install swartzrock/llm-now-local/llm-now
          test "$(llm-now --version)" = "$version"
          bun scripts/package-render.ts homebrew .release-artifacts/SHA256SUMS "$tap_dir/Formula/llm-now.rb" http://127.0.0.1:8765 "$version"
          brew upgrade llm-now
          set +e
          llm-now --input smoke >stdout.txt 2>stderr.txt
          exit_code=$?
          set -e
          test "$exit_code" -eq 2
          test ! -s stdout.txt
          grep -q "usage: non-interactive calls require" stderr.txt
          brew uninstall --force llm-now
          brew untap swartzrock/llm-now-local

  chocolatey:
    needs: release-assets
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-assets
          path: .release-artifacts
      - shell: pwsh
        run: |
          $server = Start-Process bun -ArgumentList @('scripts/serve-release-assets.ts', '.release-artifacts', '8765') -PassThru
          for ($attempt = 0; $attempt -lt 20; $attempt++) {
            try { Invoke-WebRequest http://127.0.0.1:8765/SHA256SUMS -UseBasicParsing | Out-Null; break } catch { Start-Sleep 1 }
          }
          Invoke-WebRequest http://127.0.0.1:8765/SHA256SUMS -UseBasicParsing | Out-Null
          "ASSET_SERVER_PID=$($server.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .choco-source | Out-Null
          $version = bun -e 'console.log(require("./package.json").version)'
          bun scripts/package-render.ts chocolatey .release-artifacts/SHA256SUMS .choco-old http://127.0.0.1:8765 0.0.0
          choco pack .choco-old/llm-now.nuspec --outputdirectory .choco-source
          choco install llm-now --version 0.0.0 --source "$PWD/.choco-source" --yes --no-progress
          if ((llm-now --version) -ne $version) { throw 'installed binary version mismatch' }
          bun scripts/package-render.ts chocolatey .release-artifacts/SHA256SUMS .choco-current http://127.0.0.1:8765 $version
          choco pack .choco-current/llm-now.nuspec --outputdirectory .choco-source
          choco upgrade llm-now --version $version --source "$PWD/.choco-source" --yes --no-progress
          llm-now --input smoke > stdout.txt 2> stderr.txt
          if ($LASTEXITCODE -ne 2) { throw 'deterministic failure exit mismatch' }
          if ((Get-Item stdout.txt).Length -ne 0) { throw 'deterministic failure wrote stdout' }
          if (-not (Select-String -Quiet 'usage: non-interactive calls require' stderr.txt)) { throw 'usage diagnostic missing' }
          choco uninstall llm-now --yes --no-progress
          Stop-Process -Id $env:ASSET_SERVER_PID -ErrorAction SilentlyContinue
