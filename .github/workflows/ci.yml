name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run runtime:smoke

  native:
    needs: source
    name: native-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
      - if: matrix.target != 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - if: matrix.target == 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - run: bun scripts/release-validate.ts archives dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  release-assets:
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error
