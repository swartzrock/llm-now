name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run runtime:smoke

  native:
    needs: source
    name: native-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
      - shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - if: matrix.target != 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - if: matrix.target == 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - if: contains(fromJSON('["macos-x64","macos-arm64","linux-x64","linux-arm64","windows-x64"]'), matrix.target) && (matrix.target == 'linux-x64' || matrix.target == 'linux-arm64')
        run: sudo apt-get update && sudo apt-get install --yes dbus-x11 gnome-keyring libsecret-1-0
      - if: contains(fromJSON('["macos-x64","macos-arm64","linux-x64","linux-arm64","windows-x64"]'), matrix.target) && matrix.target != 'linux-x64' && matrix.target != 'linux-arm64'
        run: bun scripts/release-validate.ts secrets ${{ matrix.target }}
      - if: contains(fromJSON('["macos-x64","macos-arm64","linux-x64","linux-arm64","windows-x64"]'), matrix.target) && (matrix.target == 'linux-x64' || matrix.target == 'linux-arm64')
        shell: bash
        run: |
          runtime="$(mktemp -d)"
          trap 'rm -rf "$runtime"' EXIT
          chmod 700 "$runtime"
          dbus-run-session -- bash -euo pipefail -c '
            export HOME="$1/home"
            export XDG_DATA_HOME="$HOME/.local/share"
            export XDG_RUNTIME_DIR="$1/runtime"
            mkdir -p "$HOME" "$XDG_RUNTIME_DIR"
            chmod 700 "$XDG_RUNTIME_DIR"
            eval "$(printf "%s\n" "llm-now-ci" | gnome-keyring-daemon --unlock --components=secrets)"
            bun scripts/release-validate.ts secrets "$2"
          ' bash "$runtime" "${{ matrix.target }}"
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - run: bun scripts/release-validate.ts archives dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  release-assets:
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error
