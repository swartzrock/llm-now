name: Release candidate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to validate
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-ref:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: test "v$(bun -e 'console.log(require("./package.json").version)')" = "$TAG"
        env:
          TAG: ${{ inputs.tag }}
      - run: git merge-base --is-ancestor HEAD origin/main

  native:
    needs: validate-ref
    name: release-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  release-assets:
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error
