name: Release

on:
  workflow_call:
    inputs:
      release-sha:
        description: Exact protected-main commit to build
        required: true
        type: string
      publish:
        description: Sign, attest, tag, and publish after protected approval
        required: true
        type: boolean
  workflow_dispatch:
    inputs:
      release-sha:
        description: Exact protected-main commit to build
        required: true
        type: string
      publish:
        description: Sign, attest, tag, and publish after protected approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  attestations: read

concurrency:
  group: release-${{ inputs.release-sha }}
  cancel-in-progress: false

jobs:
  validate-ref:
    runs-on: ubuntu-24.04
    outputs:
      release-sha: ${{ steps.metadata.outputs.release-sha }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      should-build: ${{ steps.state.outputs.should-build }}
    steps:
      - if: ${{ inputs.publish }}
        run: test "${{ github.event.repository.visibility }}" = "public"
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.release-sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - id: metadata
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release-sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          [[ "$RELEASE_SHA" =~ ^[a-f0-9]{40}$ ]] || { echo "release-sha must be a full lowercase commit SHA" >&2; exit 1; }
          git fetch origin main
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main
          VERSION="$(bun -p 'require("./package.json").version')"
          [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || { echo "package version must be stable X.Y.Z" >&2; exit 1; }
          echo "release-sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - if: ${{ inputs.publish }}
        env:
          RELEASE_SHA: ${{ steps.metadata.outputs.release-sha }}
        run: |
          test "$RELEASE_SHA" = "$GITHUB_SHA" || {
            echo "publish runs must be triggered at the exact release SHA so attestations bind to the released source" >&2
            exit 1
          }
      - id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH: ${{ inputs.publish }}
          RELEASE_SHA: ${{ steps.metadata.outputs.release-sha }}
          VERSION: ${{ steps.metadata.outputs.version }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH" != "true" ]]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          expected_assets() {
            printf '%s\n' \
              "SHA256SUMS" \
              "llm-now-v${VERSION}-linux-arm64.zip" \
              "llm-now-v${VERSION}-linux-x64.zip" \
              "llm-now-v${VERSION}-macos-arm64.zip" \
              "llm-now-v${VERSION}-macos-x64.zip" \
              "llm-now-v${VERSION}-windows-x64.zip"
          }
          verify_complete_release() {
            test "$(jq -r '.draft' release.json)" = "false"
            test "$(jq -r '.prerelease' release.json)" = "false"
            diff -u <(expected_assets) <(jq -r '.assets[].name' release.json | sort)
            rm -rf .published-release
            mkdir .published-release
            gh release download "$TAG" --dir .published-release
            (cd .published-release && sha256sum --check SHA256SUMS)
            for archive in .published-release/*.zip; do
              gh attestation verify "$archive" \
                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
                --source-digest "$RELEASE_SHA"
            done
          }

          tag_exists=false
          tag_probe_status=0
          git ls-remote --exit-code --refs origin "refs/tags/$TAG" >/dev/null 2>tag-probe-error || tag_probe_status=$?
          if [[ "$tag_probe_status" -eq 0 ]]; then
            tag_exists=true
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            test "$(git rev-parse "refs/tags/${TAG}^{commit}")" = "$RELEASE_SHA" || {
              echo "$TAG already points to another commit" >&2
              exit 1
            }
          elif [[ "$tag_probe_status" -ne 2 ]]; then
            cat tag-probe-error >&2
            exit "$tag_probe_status"
          fi
          rm -f tag-probe-error

          release_status="$(curl --silent --show-error --connect-timeout 10 --max-time 30 --retry 2 --retry-all-errors \
            --output release.json --write-out '%{http_code}' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")"
          case "$release_status" in
            200)
              [[ "$tag_exists" == "true" ]] || { echo "Release $TAG exists without its tag" >&2; exit 1; }
              verify_complete_release
              echo "should-build=false" >> "$GITHUB_OUTPUT"
              ;;
            404)
              if [[ "$tag_exists" == "false" ]]; then
                published_tags="$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name')"
                while IFS= read -r published_tag; do
                  candidate="${published_tag#v}"
                  [[ "$published_tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || continue
                  newest="$(printf '%s\n%s\n' "$VERSION" "$candidate" | sort -V | tail -n 1)"
                  if [[ "$newest" == "$candidate" && "$candidate" != "$VERSION" ]]; then
                    echo "Refusing to create $TAG because higher stable Release $published_tag is already public" >&2
                    exit 1
                  fi
                done <<< "$published_tags"

                parent_sha="$(git rev-parse "${RELEASE_SHA}^1")"
                output="$(mktemp)"
                bun scripts/release-plan.ts "$parent_sha" "$RELEASE_SHA" "$output"
                grep -qx 'should-release=true' "$output" || {
                  echo "untagged publication requires a release-shaped first-parent transition" >&2
                  exit 1
                }
              fi
              echo "should-build=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Could not inspect Release $TAG (HTTP $release_status)" >&2
              exit 1
              ;;
          esac

  native:
    if: needs.validate-ref.outputs.should-build == 'true'
    needs: validate-ref
    name: release-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target: [macos-x64, macos-arm64, linux-x64, linux-arm64, windows-x64]
    runs-on: ${{ fromJSON('{"macos-x64":"macos-15-intel","macos-arm64":"macos-15","linux-x64":"ubuntu-24.04","linux-arm64":"ubuntu-24.04-arm","windows-x64":"windows-2025"}')[matrix.target] }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - if: matrix.target != 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - if: matrix.target == 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  unsigned-assets:
    if: ${{ !inputs.publish && needs.validate-ref.outputs.should-build == 'true' }}
    needs: [native, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  sign-macos:
    if: ${{ inputs.publish && needs.validate-ref.outputs.should-build == 'true' }}
    needs: [native, validate-ref]
    name: sign-${{ matrix.target }}
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: native-${{ matrix.target }}
          path: .release-artifacts
      - shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for name in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            test -n "${!name}" || { echo "Missing required release-signing secret: $name" >&2; exit 1; }
          done
          trap 'security delete-keychain release-signing.keychain-db 2>/dev/null || true; rm -f certificate.p12' EXIT
          archive="$(find .release-artifacts -name '*.zip' -type f -print -quit)"
          mkdir signed
          unzip -q "$archive" -d signed
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > certificate.p12
          security create-keychain -p temporary release-signing.keychain-db
          security default-keychain -s release-signing.keychain-db
          security unlock-keychain -p temporary release-signing.keychain-db
          security import certificate.p12 -k release-signing.keychain-db -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temporary release-signing.keychain-db
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" signed/llm-now
          codesign --verify --strict --verbose=2 signed/llm-now
      - shell: bash
        run: bun scripts/repack-archive.ts .release-artifacts/*.zip signed/llm-now
      - shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            test -n "${!name}" || { echo "Missing required release-signing secret: $name" >&2; exit 1; }
          done
          archive="$(find .release-artifacts -name '*.zip' -type f -print -quit)"
          xcrun notarytool submit "$archive" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          codesign -vvvv -R="notarized" --check-notarization signed/llm-now
      - shell: bash
        run: bun scripts/release-validate.ts smoke .release-artifacts/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: .release-artifacts/*.zip
          if-no-files-found: error
          include-hidden-files: true

  final-assets:
    if: ${{ inputs.publish && needs.validate-ref.outputs.should-build == 'true' }}
    needs: [native, sign-macos, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-macos-*
          path: .release-artifacts/macos
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-linux-*
          path: .release-artifacts/linux
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-windows-*
          path: .release-artifacts/windows
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - run: bun scripts/release-notes.ts "$VERSION" "$RELEASE_SHA" CHANGELOG.md dist/RELEASE_NOTES.md
        env:
          VERSION: ${{ needs.validate-ref.outputs.version }}
          RELEASE_SHA: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
            dist/RELEASE_NOTES.md
          if-no-files-found: error

  publish:
    if: ${{ inputs.publish && needs.validate-ref.outputs.should-build == 'true' }}
    needs: [final-assets, validate-ref]
    runs-on: ubuntu-24.04
    environment: release-publication
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: dist
      - shell: bash
        working-directory: dist
        run: sha256sum --check SHA256SUMS
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/SHA256SUMS
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-ref.outputs.tag }}
          VERSION: ${{ needs.validate-ref.outputs.version }}
          RELEASE_SHA: ${{ needs.validate-ref.outputs.release-sha }}
        run: |
          set -euo pipefail
          expected_assets() {
            printf '%s\n' \
              "SHA256SUMS" \
              "llm-now-v${VERSION}-linux-arm64.zip" \
              "llm-now-v${VERSION}-linux-x64.zip" \
              "llm-now-v${VERSION}-macos-arm64.zip" \
              "llm-now-v${VERSION}-macos-x64.zip" \
              "llm-now-v${VERSION}-windows-x64.zip"
          }
          verify_complete_release() {
            test "$(jq -r '.draft' release.json)" = "false"
            test "$(jq -r '.prerelease' release.json)" = "false"
            diff -u <(expected_assets) <(jq -r '.assets[].name' release.json | sort)
            rm -rf .published-release
            mkdir .published-release
            gh release download "$TAG" --dir .published-release
            (cd .published-release && sha256sum --check SHA256SUMS)
            for archive in .published-release/*.zip; do
              gh attestation verify "$archive" \
                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
                --source-digest "$RELEASE_SHA"
            done
          }

          tag_exists=false
          tag_probe_status=0
          git ls-remote --exit-code --refs origin "refs/tags/$TAG" >/dev/null 2>tag-probe-error || tag_probe_status=$?
          if [[ "$tag_probe_status" -eq 0 ]]; then
            tag_exists=true
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            test "$(git rev-parse "refs/tags/${TAG}^{commit}")" = "$RELEASE_SHA" || {
              echo "$TAG already points to another commit" >&2
              exit 1
            }
          elif [[ "$tag_probe_status" -ne 2 ]]; then
            cat tag-probe-error >&2
            exit "$tag_probe_status"
          fi
          rm -f tag-probe-error

          release_status="$(curl --silent --show-error --connect-timeout 10 --max-time 30 --retry 2 --retry-all-errors \
            --output release.json --write-out '%{http_code}' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")"
          case "$release_status" in
            200)
              [[ "$tag_exists" == "true" ]] || { echo "Release $TAG exists without its tag" >&2; exit 1; }
              verify_complete_release
              echo "Release $TAG already exists with verified assets; no publication mutation needed"
              exit 0
              ;;
            404) ;;
            *) echo "Could not inspect Release $TAG (HTTP $release_status)" >&2; exit 1 ;;
          esac

          if [[ "$tag_exists" == "false" ]]; then
            published_tags="$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name')"
            while IFS= read -r published_tag; do
              candidate="${published_tag#v}"
              [[ "$published_tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || continue
              newest="$(printf '%s\n%s\n' "$VERSION" "$candidate" | sort -V | tail -n 1)"
              if [[ "$newest" == "$candidate" && "$candidate" != "$VERSION" ]]; then
                echo "Refusing to create $TAG because higher stable Release $published_tag is already public" >&2
                exit 1
              fi
            done <<< "$published_tags"

            GIT_AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
            export GIT_AUTH_HEADER
            git tag "$TAG" "$RELEASE_SHA"
            git --config-env=http.https://github.com/.extraheader=GIT_AUTH_HEADER push origin "refs/tags/$TAG"
            git --config-env=http.https://github.com/.extraheader=GIT_AUTH_HEADER fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          fi
          test "$(git rev-parse "refs/tags/${TAG}^{commit}")" = "$RELEASE_SHA"
          gh release create "$TAG" dist/*.zip dist/SHA256SUMS \
            --verify-tag \
            --notes-file dist/RELEASE_NOTES.md \
            --title "$TAG"
