name: Release candidate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to validate
        required: true
        type: string
      publish:
        description: Sign artifacts and publish the GitHub Release after protected-environment approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate-ref:
    runs-on: ubuntu-24.04
    outputs:
      release-sha: ${{ steps.release-sha.outputs.value }}
    steps:
      - run: test "$GITHUB_REF" = "refs/heads/main"
      - if: ${{ inputs.publish }}
        run: test "${{ github.event.repository.visibility }}" = "public"
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: test "v$(bun -e 'console.log(require("./package.json").version)')" = "$TAG"
        env:
          TAG: ${{ inputs.tag }}
      - run: git merge-base --is-ancestor HEAD origin/main
      - id: release-sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - if: ${{ inputs.publish }}
        env:
          RELEASE_SHA: ${{ steps.release-sha.outputs.value }}
        run: test "$RELEASE_SHA" = "$GITHUB_SHA"

  native:
    needs: validate-ref
    name: release-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        target: [macos-x64, macos-arm64, linux-x64, linux-arm64, windows-x64]
    runs-on: ${{ fromJSON('{"macos-x64":"macos-15-intel","macos-arm64":"macos-15","linux-x64":"ubuntu-24.04","linux-arm64":"ubuntu-24.04-arm","windows-x64":"windows-2025"}')[matrix.target] }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - if: matrix.target != 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - if: matrix.target == 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  unsigned-assets:
    if: ${{ !inputs.publish }}
    needs: [native, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  sign-macos:
    if: ${{ inputs.publish }}
    needs: [native, validate-ref]
    name: sign-${{ matrix.target }}
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: native-${{ matrix.target }}
          path: .release-artifacts
      - shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for name in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            test -n "${!name}" || { echo "Missing required release-signing secret: $name" >&2; exit 1; }
          done
          trap 'security delete-keychain release-signing.keychain-db 2>/dev/null || true; rm -f certificate.p12' EXIT
          archive="$(find .release-artifacts -name '*.zip' -type f -print -quit)"
          mkdir signed
          unzip -q "$archive" -d signed
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > certificate.p12
          security create-keychain -p temporary release-signing.keychain-db
          security default-keychain -s release-signing.keychain-db
          security unlock-keychain -p temporary release-signing.keychain-db
          security import certificate.p12 -k release-signing.keychain-db -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temporary release-signing.keychain-db
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" signed/llm-now
          codesign --verify --strict --verbose=2 signed/llm-now
      - shell: bash
        run: bun scripts/repack-archive.ts .release-artifacts/*.zip signed/llm-now
      - shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            test -n "${!name}" || { echo "Missing required release-signing secret: $name" >&2; exit 1; }
          done
          archive="$(find .release-artifacts -name '*.zip' -type f -print -quit)"
          xcrun notarytool submit "$archive" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          codesign -vvvv -R="notarized" --check-notarization signed/llm-now
      - shell: bash
        run: bun scripts/release-validate.ts smoke .release-artifacts/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: .release-artifacts/*.zip
          if-no-files-found: error
          include-hidden-files: true

  final-assets:
    if: ${{ inputs.publish }}
    needs: [native, sign-macos, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-macos-*
          path: .release-artifacts/macos
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-linux-*
          path: .release-artifacts/linux
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-windows-*
          path: .release-artifacts/windows
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  publish:
    if: ${{ inputs.publish }}
    needs: [final-assets, validate-ref]
    runs-on: ubuntu-24.04
    environment: release-publication
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
          fetch-depth: 0
          persist-credentials: false
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          RELEASE_SHA: ${{ needs.validate-ref.outputs.release-sha }}
        run: |
          GIT_AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
          export GIT_AUTH_HEADER
          git --config-env=http.https://github.com/.extraheader=GIT_AUTH_HEADER fetch origin "+refs/tags/${TAG}:refs/tags/${TAG}"
          test "$(git rev-parse "refs/tags/${TAG}^{commit}")" = "$RELEASE_SHA"
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: dist
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")"
          case "$status" in
            404) ;;
            200) echo "Release $TAG already exists; remove it explicitly before publishing replacement assets" >&2; exit 1 ;;
            *) echo "Could not verify whether release $TAG exists (HTTP $status)" >&2; exit 1 ;;
          esac
      - shell: bash
        working-directory: dist
        run: sha256sum --check SHA256SUMS
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/SHA256SUMS
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          RELEASE_SHA: ${{ needs.validate-ref.outputs.release-sha }}
          NOTES_FILE: release-notes.md
        run: |
          cat > "$NOTES_FILE" <<'EOF'
          ## Choose an asset

          - macOS x64 and ARM64 archives are signed and notarized.
          - Linux x64 and ARM64 archives require glibc; musl and Alpine are not supported.
          - Windows x64 is unsigned early access.

          Windows may show a SmartScreen warning and, where policy permits, offer a manual **Run anyway** path. Smart App Control or enterprise policy may block execution with no user bypass. Do not weaken or disable security controls to run llm-now.

          ## Verify the download

          Download one archive and `SHA256SUMS`, then verify only that archive's manifest entry.

          macOS:

          ```sh
          ARCHIVE=<downloaded-archive.zip>
          grep "  $ARCHIVE$" SHA256SUMS | shasum -a 256 -c -
          ```

          Linux:

          ```sh
          ARCHIVE=<downloaded-archive.zip>
          grep "  $ARCHIVE$" SHA256SUMS | sha256sum --check -
          ```

          Windows PowerShell:

          ```powershell
          $Archive = "<downloaded-archive.zip>"
          $ChecksumLines = @(Get-Content SHA256SUMS | Where-Object { $_.EndsWith("  $Archive") })
          if ($ChecksumLines.Count -ne 1) { throw "Expected one checksum for $Archive" }
          $Expected = ($ChecksumLines[0] -split '\s+')[0].ToLowerInvariant()
          $Actual = (Get-FileHash $Archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($Expected -ne $Actual) { throw "SHA-256 mismatch for $Archive" }
          ```

          Verify each archive's provenance against this repository, release workflow, and exact source digest:

          ```sh
          EOF
          printf 'gh attestation verify <downloaded-archive.zip> --repo swartzrock/llm-now --signer-workflow swartzrock/llm-now/.github/workflows/release.yml --source-digest %s\n' "$RELEASE_SHA" >> "$NOTES_FILE"
          cat >> "$NOTES_FILE" <<'EOF'
          ```
          EOF
          printf '\nRelease source digest: `%s`\n\n## Release notes\n\n' "$RELEASE_SHA" >> "$NOTES_FILE"
          git for-each-ref --format='%(contents)' "refs/tags/${TAG}" >> "$NOTES_FILE"
          gh release create "$TAG" dist/*.zip dist/SHA256SUMS --verify-tag --notes-file "$NOTES_FILE" --title "$TAG"
