name: Release candidate

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to validate
        required: true
        type: string
      publish:
        description: Sign artifacts and publish the GitHub Release after protected-environment approval
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate-ref:
    runs-on: ubuntu-24.04
    outputs:
      release-sha: ${{ steps.release-sha.outputs.value }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: test "v$(bun -e 'console.log(require("./package.json").version)')" = "$TAG"
        env:
          TAG: ${{ inputs.tag }}
      - run: git merge-base --is-ancestor HEAD origin/main
      - id: release-sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  native:
    needs: validate-ref
    name: release-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: windows-x64
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - if: matrix.target != 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - if: matrix.target == 'windows-x64'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
          bun-download-url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.14/bun-windows-x64-baseline.zip
      - run: bun install --frozen-lockfile
      - run: bun scripts/build.ts --target ${{ matrix.target }} --outdir dist
      - shell: bash
        run: bun scripts/release-validate.ts smoke dist/*.zip
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/*.zip
          if-no-files-found: error

  unsigned-assets:
    if: ${{ !inputs.publish }}
    needs: [native, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: native-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  sign-macos:
    if: ${{ inputs.publish }}
    needs: [native, validate-ref]
    name: sign-${{ matrix.target }}
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-x64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: native-${{ matrix.target }}
          path: .release-artifacts
      - shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          for name in APPLE_CERTIFICATE_P12_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            test -n "${!name}" || { echo "Missing required release-signing secret: $name" >&2; exit 1; }
          done
          trap 'security delete-keychain release-signing.keychain-db 2>/dev/null || true; rm -f certificate.p12' EXIT
          archive="$(find .release-artifacts -name '*.zip' -type f -print -quit)"
          mkdir signed
          unzip -q "$archive" -d signed
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > certificate.p12
          security create-keychain -p temporary release-signing.keychain-db
          security default-keychain -s release-signing.keychain-db
          security unlock-keychain -p temporary release-signing.keychain-db
          security import certificate.p12 -k release-signing.keychain-db -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temporary release-signing.keychain-db
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" signed/llm-now
          codesign --verify --strict --verbose=2 signed/llm-now
      - shell: bash
        run: bun scripts/repack-archive.ts .release-artifacts/*.zip signed/llm-now
      - shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          for name in APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            test -n "${!name}" || { echo "Missing required release-signing secret: $name" >&2; exit 1; }
          done
          archive="$(find .release-artifacts -name '*.zip' -type f -print -quit)"
          xcrun notarytool submit "$archive" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          spctl --assess --type execute --verbose=2 signed/llm-now
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: .release-artifacts/*.zip
          if-no-files-found: error

  sign-windows:
    if: ${{ inputs.publish }}
    needs: [native, validate-ref]
    runs-on: windows-2025
    environment: release-signing
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: native-windows-x64
          path: .release-artifacts
      - shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_PFX_BASE64) { throw 'Missing required release-signing secret: WINDOWS_CERTIFICATE_PFX_BASE64' }
          if (-not $env:WINDOWS_CERTIFICATE_PASSWORD) { throw 'Missing required release-signing secret: WINDOWS_CERTIFICATE_PASSWORD' }
          try {
            $archive = Get-ChildItem .release-artifacts/*.zip | Select-Object -First 1
            Expand-Archive $archive.FullName -DestinationPath signed
            [IO.File]::WriteAllBytes('certificate.pfx', [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1
            if (-not $signtool) { throw 'SignTool was not found' }
            & $signtool.FullName sign /f certificate.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 signed/llm-now.exe
            if ($LASTEXITCODE -ne 0) { throw 'SignTool signing failed' }
            & $signtool.FullName verify /pa /v signed/llm-now.exe
            if ($LASTEXITCODE -ne 0) { throw 'Authenticode verification failed' }
          } finally {
            Remove-Item certificate.pfx -Force -ErrorAction SilentlyContinue
          }
      - shell: pwsh
        run: bun scripts/repack-archive.ts (Get-ChildItem .release-artifacts/*.zip | Select-Object -First 1).FullName signed/llm-now.exe
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-windows-x64
          path: .release-artifacts/*.zip
          if-no-files-found: error

  promote-linux:
    if: ${{ inputs.publish }}
    needs: native
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [linux-x64, linux-arm64]
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: native-${{ matrix.target }}
          path: .release-artifacts
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: .release-artifacts/*.zip
          if-no-files-found: error

  signed-assets:
    if: ${{ inputs.publish }}
    needs: [sign-macos, sign-windows, promote-linux, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: .release-artifacts
          merge-multiple: true
      - run: bun scripts/release-validate.ts assemble .release-artifacts dist
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.zip
            dist/SHA256SUMS
          if-no-files-found: error

  package-rendering:
    if: ${{ always() && ((inputs.publish && needs.signed-assets.result == 'success') || (!inputs.publish && needs.unsigned-assets.result == 'success')) }}
    needs: [unsigned-assets, signed-assets, validate-ref]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: .release-artifacts
      - run: bun scripts/package-render.ts homebrew .release-artifacts/SHA256SUMS rendered/llm-now.rb "$RELEASE_BASE_URL"
        env:
          RELEASE_BASE_URL: https://github.com/swartzrock/llm-now/releases/download/${{ inputs.tag }}
      - run: bun scripts/package-render.ts chocolatey .release-artifacts/SHA256SUMS rendered/chocolatey "$RELEASE_BASE_URL"
        env:
          RELEASE_BASE_URL: https://github.com/swartzrock/llm-now/releases/download/${{ inputs.tag }}
      - run: test -z "$(grep -R -E '__[A-Z0-9_]+__|http://127\.0\.0\.1' rendered || true)"

  homebrew-gate:
    if: ${{ always() && needs.package-rendering.result == 'success' }}
    needs: [package-rendering, validate-ref]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c # 2026.07.10.1
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: .release-artifacts
      - shell: bash
        run: |
          bun scripts/serve-release-assets.ts .release-artifacts 8765 > .release-artifacts/server.log 2>&1 &
          for attempt in {1..20}; do curl --fail --silent http://127.0.0.1:8765/SHA256SUMS >/dev/null && break; sleep 1; done
          curl --fail --silent http://127.0.0.1:8765/SHA256SUMS >/dev/null
          git config --global user.name "llm-now CI"
          git config --global user.email "ci@llm-now.invalid"
          brew tap-new swartzrock/llm-now-release-gate
          tap_dir="$(brew --repository swartzrock/llm-now-release-gate)"
          version="$(bun -e 'console.log(require("./package.json").version)')"
          bun scripts/package-render.ts homebrew .release-artifacts/SHA256SUMS "$tap_dir/Formula/llm-now.rb" http://127.0.0.1:8765 0.0.0
          brew install swartzrock/llm-now-release-gate/llm-now
          bun scripts/package-render.ts homebrew .release-artifacts/SHA256SUMS "$tap_dir/Formula/llm-now.rb" http://127.0.0.1:8765 "$version"
          brew upgrade llm-now
          test "$(llm-now --version)" = "$version"
          brew uninstall --force llm-now
          brew untap swartzrock/llm-now-release-gate

  chocolatey-gate:
    if: ${{ always() && needs.package-rendering.result == 'success' }}
    needs: [package-rendering, validate-ref]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: .release-artifacts
      - shell: pwsh
        run: |
          $server = Start-Process bun -ArgumentList @('scripts/serve-release-assets.ts', '.release-artifacts', '8765') -PassThru
          for ($attempt = 0; $attempt -lt 20; $attempt++) {
            try { Invoke-WebRequest http://127.0.0.1:8765/SHA256SUMS -UseBasicParsing | Out-Null; break } catch { Start-Sleep 1 }
          }
          New-Item -ItemType Directory -Force .choco-source | Out-Null
          $version = bun -e 'console.log(require("./package.json").version)'
          bun scripts/package-render.ts chocolatey .release-artifacts/SHA256SUMS .choco-old http://127.0.0.1:8765 0.0.0
          choco pack .choco-old/llm-now.nuspec --outputdirectory .choco-source
          choco install llm-now --version 0.0.0 --source "$PWD/.choco-source" --yes --no-progress
          bun scripts/package-render.ts chocolatey .release-artifacts/SHA256SUMS .choco-current http://127.0.0.1:8765 $version
          choco pack .choco-current/llm-now.nuspec --outputdirectory .choco-source
          choco upgrade llm-now --version $version --source "$PWD/.choco-source" --yes --no-progress
          if ((llm-now --version) -ne $version) { throw 'installed binary version mismatch' }
          choco uninstall llm-now --yes --no-progress
          Stop-Process -Id $server.Id -ErrorAction SilentlyContinue

  publish:
    if: ${{ inputs.publish }}
    needs: [signed-assets, homebrew-gate, chocolatey-gate, validate-ref]
    runs-on: ubuntu-24.04
    environment: release-publication
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.validate-ref.outputs.release-sha }}
          fetch-depth: 0
          persist-credentials: false
      - shell: bash
        env:
          TAG: ${{ inputs.tag }}
          RELEASE_SHA: ${{ needs.validate-ref.outputs.release-sha }}
        run: |
          git fetch origin "+refs/tags/${TAG}:refs/tags/${TAG}"
          test "$(git rev-parse "refs/tags/${TAG}^{commit}")" = "$RELEASE_SHA"
      - uses: actions/download-artifact@v8.0.1
        with:
          name: release-assets
          path: dist
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ needs.validate-ref.outputs.release-sha }}
          files: |
            dist/*.zip
            dist/SHA256SUMS
          fail_on_unmatched_files: true
